name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,clickhouse]"

      - name: Run unit tests
        run: pytest -m "not integration"

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  e2e-clickhouse:
    # The M2 exit gate against a REAL ClickHouse (testcontainers; ubuntu
    # runners ship Docker): abk init → seed → run → results → idempotent
    # re-run. The PG/MySQL testcontainers suite (incl. the two-process claim
    # race) is a recorded deferral — see ROADMAP.md M2.
    name: E2E (ClickHouse, testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with integration extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,integration,clickhouse]"

      - name: Run the first-run e2e gate
        run: pytest tests/e2e -q --no-cov

  bundle:
    # The committed-asset freshness gate (m3-implementation-plan.md D7/WP3):
    # rebuild web/ and diff against abkit/*/assets/*.js so the committed
    # bundle can never silently drift from its sources, assert the
    # peeking-honesty marker classes survive in the built artifact, and run
    # the jsdom smoke suite against it.
    name: Bundle (web/ freshness + markers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          # one root lockfile for the whole JS monorepo (web/ + website/)
          cache-dependency-path: package-lock.json

      - name: Install the JS workspaces
        # `npm ci` at the workspace ROOT hydrates both the renderer core
        # (web/, package abkit-web) and the site (website/) from the single
        # root lockfile — no per-package install.
        run: npm ci --no-audit --no-fund

      - name: Type-check the renderer sources
        run: npm run check --workspace web

      - name: Rebuild bundles (asserts globals + marker classes)
        run: npm run build --workspace web

      - name: Committed assets are fresh
        # porcelain (not `git diff`) so a rebuilt-but-never-committed NEW
        # asset (the WP7 explore.js scenario) fails too, not only drift in
        # tracked files. MUST use the ':(glob)' pathspec magic: a plain
        # 'abkit/*/assets/' pathspec's `*` does NOT span '/', so it silently
        # matches nothing and the gate becomes a no-op (M4 WP5 finding).
        run: |
          status=$(git status --porcelain -- ':(glob)abkit/*/assets/**')
          if [ -n "$status" ]; then
            echo "committed assets drifted from web/ sources:"; echo "$status"; exit 1
          fi

      - name: Marker classes present in committed bundles
        run: |
          for bundle in abkit/*/assets/*.js; do
            for marker in abk-prehorizon abk-insufficient abk-srm-fail; do
              grep -q "$marker" "$bundle" \
                || { echo "missing marker in $bundle: $marker"; exit 1; }
            done
          done

      - name: Python-side placeholder hexes stay inside the brand-token layer
        # the report + explore page shells/favicons are the only hexes outside
        # web/src/shared/chart.ts TOKEN_FALLBACKS — every one must appear
        # there so an M6 palette swap cannot silently miss them
        run: |
          for shell in abkit/reporting/html_report.py abkit/tuning/html.py; do
            for hex in $(grep -oiE '(#|%23)[0-9a-f]{6}' "$shell" \
                          | sed -E 's/^(#|%23)//' | sort -u); do
              grep -qi "#$hex" web/src/shared/chart.ts \
                || { echo "hex #$hex in $shell is not in TOKEN_FALLBACKS"; exit 1; }
            done
          done

      - name: brand.css and TOKEN_FALLBACKS stay in token lockstep
        # The one brand-token layer has two mirrors: web/src/shared/chart.ts
        # TOKEN_FALLBACKS (the frozen Iris palette compiled into the committed,
        # self-contained bundles) and website/src/styles/brand.css (the site's
        # --abk-* values). NAME parity is a hard gate in BOTH directions so a
        # palette swap can never add/rename a token on one side that the other
        # never reads. VALUE parity is now ALSO a hard gate (M6 WP7b froze the
        # Iris palette into TOKEN_FALLBACKS) for the theme-independent tokens;
        # the per-theme (light/dark) surface tokens legitimately carry two
        # brand.css values and cannot equal a single fallback, so they are
        # value-skipped (the bundle's fallback is the light-surface default).
        # Skips cleanly until brand.css lands.
        run: |
          node --input-type=commonjs - <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');
          // 1) the placeholder palette compiled into the committed bundles
          const chartTs = fs.readFileSync('web/src/shared/chart.ts', 'utf8');
          const block = chartTs.match(/TOKEN_FALLBACKS[^{]*\{([\s\S]*?)\};/);
          if (!block) { console.error('could not locate TOKEN_FALLBACKS in chart.ts'); process.exit(1); }
          const fallbacks = {};
          for (const m of block[1].matchAll(/'(--abk-[a-z0-9-]+)'\s*:\s*'([^']*)'/g)) {
            fallbacks[m[1]] = m[2].trim().toLowerCase();
          }
          const fbNames = Object.keys(fallbacks);
          if (fbNames.length === 0) { console.error('TOKEN_FALLBACKS parsed empty'); process.exit(1); }
          // 2) find the site's real --abk-* values (skip until brand.css lands)
          function findBrand(dir) {
            let out = [];
            let ents;
            try { ents = fs.readdirSync(dir, { withFileTypes: true }); } catch { return out; }
            for (const e of ents) {
              if (['node_modules', '.astro', 'dist', '.git'].includes(e.name)) continue;
              const full = path.join(dir, e.name);
              if (e.isDirectory()) out = out.concat(findBrand(full));
              else if (e.name === 'brand.css') out.push(full);
            }
            return out;
          }
          const cssFiles = findBrand('website');
          if (cssFiles.length === 0) {
            console.log('brand.css not present yet (parallel M6 site WP) — skipping token sync.');
            process.exit(0);
          }
          const brand = {};
          for (const f of cssFiles) {
            const css = fs.readFileSync(f, 'utf8').replace(/\/\*[\s\S]*?\*\//g, '');
            for (const m of css.matchAll(/(--abk-[a-z0-9-]+)\s*:\s*([^;]+);/g)) {
              (brand[m[1]] ||= []).push(m[2].trim().toLowerCase());
            }
          }
          const brandNames = Object.keys(brand);
          // 3) NAME sync — hard gate, both directions
          const missing = fbNames.filter((n) => !brandNames.includes(n));
          const extra = brandNames.filter((n) => !fbNames.includes(n));
          let failed = false;
          if (missing.length) { console.error('in TOKEN_FALLBACKS but NOT in brand.css:', missing.join(', ')); failed = true; }
          if (extra.length) { console.error('--abk-* in brand.css but NOT in TOKEN_FALLBACKS:', extra.join(', ')); failed = true; }
          // 4) VALUE sync — HARD gate for single-value (theme-independent)
          // tokens now that the Iris palette is frozen into TOKEN_FALLBACKS
          // (M6 WP7b). Per-theme (light/dark) tokens carry two brand.css values
          // and cannot equal a single fallback, so they are skipped (the
          // bundle's fallback is the light-surface default).
          const norm = (h) => { const x = h.replace('#', ''); return x.length === 3 ? '#' + x.split('').map((c) => c + c).join('') : '#' + x; };
          const isHex = (v) => /^#[0-9a-f]{3}([0-9a-f]{3})?$/.test(v);
          const diverged = [];
          for (const n of fbNames) {
            const vals = brand[n];
            if (!vals || vals.length !== 1) continue; // per-theme token — value-skip
            if (!isHex(vals[0]) || !isHex(fallbacks[n])) continue;
            if (norm(vals[0]) !== norm(fallbacks[n])) diverged.push(n + ': brand.css ' + vals[0] + ' vs fallback ' + fallbacks[n]);
          }
          if (diverged.length) {
            console.error('VALUE DRIFT — theme-independent --abk-* tokens must match brand.css (the frozen Iris palette):');
            for (const d of diverged) console.error('  ' + d);
            failed = true;
          }
          if (failed) process.exit(1);
          console.log('token sync OK: ' + fbNames.length + ' --abk-* names mirrored (single-value tokens value-matched) across chart.ts and brand.css');
          EOF

      - name: jsdom smoke suite over the committed bundle
        run: npm test --workspace web

  website:
    # The Astro/Starlight marketing + docs site (M6). Docker-free — the
    # Dockerfile image build + GHCR push + deploy stay in website.yml. This
    # gate proves the site builds from the workspace root: the docs sync runs,
    # `astro check` finds no broken links / missing pages / type errors, the
    # static build succeeds, and the landing demo stays in golden parity with
    # the Python stats core. It consumes web/ (package abkit-web) as a workspace
    # dependency — the landing demo imports web/src/shared/chart.ts.
    name: Website (astro build + demo parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install the JS workspaces
        run: npm ci --no-audit --no-fund

      - name: Sync docs into the site
        run: npm run sync --workspace website

      - name: Astro check (types + unresolved links)
        run: npm run check --workspace website

      - name: Astro build (reds on a missing page source or broken link)
        run: npm run build --workspace website

      - name: Landing demo stays in golden parity with the stats core
        # Hard gate: the TS landing demo re-implements the abkit compute path;
        # this asserts it reproduces the frozen Python golden within tolerance.
        run: node website/scripts/check-demo-parity.mjs

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check abkit

      - name: Black
        run: black --check abkit

      - name: Mypy
        run: mypy abkit
        # Aspirational, non-blocking. mypy now RUNS TO COMPLETION (the old
        # "metric_config.py:48 Invalid syntax" bail was a stray `# type:` comment
        # parsed as a PEP-484 type comment — fixed M6 WP1, not a numpy issue) and
        # reports ~124 real strict-mode errors (mostly Optional-handling in
        # recompute.py/readout.py). Clearing those is tracked debt (ROADMAP); until
        # then keep this non-blocking so the numeric hot paths aren't rushed.
        continue-on-error: true

      - name: Wheel ships the committed bundles
        # the real packaging gate (WP3 review finding): the source-tree tests
        # cannot catch a wheel that silently drops package-data
        run: |
          pip wheel --no-deps -w /tmp/wheelhouse .
          python - <<'EOF'
          import glob, sys, zipfile
          wheel = glob.glob("/tmp/wheelhouse/ab_analysis_kit-*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          assert "abkit/reporting/assets/report.js" in names, names
          assert "abkit/tuning/assets/explore.js" in names, names
          print("wheel contains the report + explore bundles")
          EOF
