name: website

# The docs/landing site (Astro) lands in M6 — see ROADMAP.md and
# docs/specs/branding-and-site.md. Until website/ exists this workflow only fires
# on real website/ changes (or manual dispatch), and the build step below no-ops
# safely if website/Dockerfile is absent, so it never shows a red run before the
# site is built. When the site lands, widen `paths` to include docs/**,
# .claude/rules/** and CHANGELOG.md (mirroring detectkit) so the published site
# rebuilds on content edits.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      built: ${{ steps.guard.outputs.built }}
    steps:
      - uses: actions/checkout@v4

      - id: guard
        name: Skip until the website exists
        run: |
          if [ -f website/Dockerfile ]; then
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "website/Dockerfile not present yet — skipping build (see ROADMAP M6)."
          fi

      - if: steps.guard.outputs.built == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.guard.outputs.built == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.guard.outputs.built == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alexeiveselov92/ab-analysis-kit-web
          tags: |
            type=raw,value=latest
            type=sha

      - if: steps.guard.outputs.built == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: website/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tell the deploy infra repo a fresh image is on GHCR so it redeploys
  # abkit.pipelab.dev. Requires the PIPELAB_DISPATCH_TOKEN secret (a PAT with
  # `repo` scope) on this repo. Only runs once an image was actually built.
  notify-pipelab:
    needs: build-and-push
    if: needs.build-and-push.outputs.built == 'true'
    runs-on: ubuntu-latest
    env:
      # env indirection: `secrets` is not usable in a step `if:`, so expose the
      # token's presence as a job-level boolean. A missing/empty
      # PIPELAB_DISPATCH_TOKEN then simply SKIPS the deploy notification instead
      # of reddening main on `curl -f` (a fork PR / a repo without the secret).
      HAS_DISPATCH_TOKEN: ${{ secrets.PIPELAB_DISPATCH_TOKEN != '' }}
    steps:
      - name: Trigger pipelab deploy
        if: env.HAS_DISPATCH_TOKEN == 'true'
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.PIPELAB_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/alexeiveselov92/pipelab/dispatches \
            -d '{"event_type":"ab-analysis-kit-updated","client_payload":{"sha":"${{ github.sha }}"}}'
